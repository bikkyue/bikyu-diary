name: Update Diary Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/diaries/**.md'

jobs:
  update-meta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update diaries.json
        run: node scripts/update-diary-meta.cli.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/diaries.json
          git diff --staged --quiet || git commit -m "chore: update diary metadata"
          git push
